<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <title>Peta RTLH Kab. Ngawi - Pusat Data RTLH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0C2340;
      --navy-light: #1B3A5C;
      --gold: #C8A951;
      --gold-light: #E8D48B;
      --blue: #1B6CA8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; color: #222; }

    /* ── SHARED NAV BAR ── */
    .portal-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 2000;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 48px;
    }
    .portal-nav .nav-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .portal-nav .nav-brand img { width: 30px; height: 30px; object-fit: contain; }
    .portal-nav .nav-brand span {
      font-size: 0.78rem; font-weight: 700; color: #fff;
    }
    .portal-nav .nav-brand .sub { color: var(--gold); font-size: 0.65rem; font-weight: 600; }
    .portal-nav .nav-links { display: flex; gap: 4px; }
    .portal-nav .nav-links a {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 7px;
      color: rgba(255,255,255,0.65); text-decoration: none;
      font-size: 0.75rem; font-weight: 600;
      transition: all 0.2s; border: 1px solid transparent;
    }
    .portal-nav .nav-links a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .portal-nav .nav-links a.active {
      background: rgba(200,169,81,0.15); border-color: var(--gold); color: var(--gold-light);
    }

    /* ── MAP ── */
    #map { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; }

    /* ── TOPBAR CONTROLS ── */
    .topbar {
      position: absolute; top: 62px; left: 15px; z-index: 1000;
      background: #fff; padding: 14px 16px; border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18); width: 270px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .topbar-header {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 10px; border-bottom: 1px solid #eee;
    }
    .topbar-header img { width: 40px; height: 40px; object-fit: contain; }
    .topbar-title { display: flex; flex-direction: column; line-height: 1.3; }
    .topbar-title strong { font-size: 13px; color: var(--blue); }
    .topbar-title span { font-size: 11px; color: #666; }
    .topbar-controls { display: flex; flex-direction: column; gap: 8px; }
    .topbar-controls label {
      display: flex; flex-direction: column; gap: 4px;
      font-size: 11px; color: #555; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.03em;
    }
    .topbar-controls strong { color: var(--blue); font-size: 13px; }
    select {
      padding: 6px 8px; border-radius: 7px; border: 1px solid #d0d7e3;
      background: #f8faff; font-size: 12px; color: #333; cursor: pointer;
      font-family: inherit; transition: border-color 0.2s;
    }
    select:focus { outline: none; border-color: #4a90d9; background: #fff; }
    input[type="range"] { width: 100%; accent-color: var(--blue); cursor: pointer; }

    /* ── DASHBOARD ── */
    .dashboard {
      position: absolute; top: 62px; right: 15px; z-index: 1000;
      width: 270px; background: #fff; padding: 16px;
      border-radius: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      display: flex; flex-direction: column; gap: 12px;
    }
    .dash-title {
      margin: 0; font-size: 13px; color: var(--blue); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em;
      padding-bottom: 8px; border-bottom: 1px solid #eee;
    }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .card { background: #f4f8ff; border-radius: 10px; padding: 8px 6px; text-align: center; }
    .card span { display: block; font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 2px; }
    .card h2 { margin: 0; font-size: 20px; font-weight: 700; color: var(--blue); }
    .chart-wrap { position: relative; height: 220px; }
    .chart-wrap canvas { width: 100% !important; height: 100% !important; }
    .chart-empty {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; margin: 0; font-size: 12px; color: #999;
      text-align: center; padding: 10px;
    }

    /* ── LEGEND ── */
    .legend {
      position: absolute; bottom: 30px; left: 15px; z-index: 1000;
      background: #fff; padding: 12px 14px; border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15); font-size: 12px;
      line-height: 1.6; min-width: 130px;
    }
    .legend strong { display: block; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
    .legend div { display: flex; align-items: center; gap: 7px; }
    .legend span { display: inline-block; width: 16px; height: 14px; border-radius: 3px; flex-shrink: 0; }

    /* ── LABEL ── */
    .label-jumlah {
      font-size: 11px; font-weight: 700; color: #1a1a1a;
      text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
      white-space: nowrap; pointer-events: none;
    }
    .popup-content { font-size: 13px; line-height: 1.6; }
    .popup-content b { font-size: 14px; }
    .popup-content hr { margin: 6px 0; border: none; border-top: 1px solid #eee; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .portal-nav .nav-links { display: none; }
      .topbar { width: calc(100% - 30px); top: 56px; }
      .dashboard { width: calc(100% - 30px); top: auto; bottom: 80px; right: 15px; left: 15px; }
      .dashboard .chart-wrap { height: 160px; }
      .legend {
        bottom: 10px; left: 50%; transform: translateX(-50%);
        display: flex; flex-wrap: wrap; gap: 6px 12px; align-items: center;
        min-width: unset; width: max-content; max-width: calc(100vw - 30px);
      }
      .legend strong { width: 100%; margin-bottom: 0; }
    }

    /* ── MOBILE BOTTOM NAV ── */
    .mobile-nav {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 2000; background: #fff; border-top: 1px solid #e2e8f0;
      padding: 6px 0 max(6px, env(safe-area-inset-bottom));
    }
    .mobile-nav-inner { display: flex; justify-content: space-around; }
    .mobile-nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 6px 12px; font-size: 0.6rem; font-weight: 600;
      color: #94a3b8; text-decoration: none; border-radius: 8px;
      font-family: inherit;
    }
    .mobile-nav-btn i { font-size: 1.1rem; }
    .mobile-nav-btn.active { color: var(--navy); }
    @media (max-width: 700px) { .mobile-nav { display: block; } }
  </style>
</head>
<body>

<!-- PORTAL NAV -->
<nav class="portal-nav">
  <a href="index.html" class="nav-brand">
    <img src="logo-ngawi.png" alt="Logo">
    <div>
      <div class="sub">Pusat Data RTLH</div>
      <span>Kabupaten Ngawi</span>
    </div>
  </a>
  <div class="nav-links">
    <a href="index.html"><i class="fas fa-home"></i> Beranda</a>
    <a href="peta-ngawi.html" class="active"><i class="fas fa-map"></i> Peta Kabupaten</a>
    <a href="webgis-bringin.html"><i class="fas fa-crosshairs"></i> WebGIS Bringin</a>
  </div>
</nav>

<div id="map"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-header">
    <img src="logo-ngawi.png" alt="Logo Ngawi"/>
    <div class="topbar-title">
      <strong>WebGIS RTLH</strong>
      <span>Kabupaten Ngawi</span>
    </div>
  </div>
  <div class="topbar-controls">
    <label>Kecamatan
      <select id="filterKecamatan"><option value="">Semua Kecamatan</option></select>
    </label>
    <label>Desa / Kelurahan
      <select id="filterDesa"><option value="">Semua Desa</option></select>
    </label>
    <label>Tahun: <strong id="labelTahun">2025</strong>
      <input type="range" id="tahun" min="2021" max="2025" value="2025" step="1" list="tahun-ticks"/>
      <datalist id="tahun-ticks">
        <option value="2021"></option><option value="2022"></option>
        <option value="2024"></option><option value="2025"></option>
      </datalist>
    </label>
    <!-- Quick link to Bringin detail -->
    <a href="webgis-bringin.html" style="display:flex;align-items:center;gap:6px;padding:8px 12px;background:linear-gradient(135deg,#DC2626,#F59E0B);color:#fff;border-radius:8px;font-size:0.72rem;font-weight:700;text-decoration:none;justify-content:center;margin-top:4px;">
      <i class="fas fa-crosshairs"></i> Lihat Data Detail Kec. Bringin
    </a>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard">
  <h3 class="dash-title">Statistik RTLH</h3>
  <div class="cards">
    <div class="card"><span>Total Unit</span><h2 id="totalUnit">0</h2></div>
    <div class="card"><span>Desa</span><h2 id="desaCount">0</h2></div>
    <div class="card"><span>Kecamatan</span><h2 id="kecCount">0</h2></div>
  </div>
  <div class="chart-wrap">
    <canvas id="chartKecamatan"></canvas>
    <p class="chart-empty" id="chartEmpty" style="display:none">Tidak ada data pada tahun ini.</p>
  </div>
</div>

<!-- LEGENDA -->
<div class="legend" id="legend">
  <strong>RTLH (Unit)</strong>
  <div><span style="background:#084594"></span>&gt; 50</div>
  <div><span style="background:#2171b5"></span>31 – 50</div>
  <div><span style="background:#4292c6"></span>21 – 30</div>
  <div><span style="background:#6baed6"></span>11 – 20</div>
  <div><span style="background:#9ecae1"></span>1 – 10</div>
  <div><span style="background:#f1f1f1;border:1px solid #ccc"></span>0</div>
</div>

<!-- MOBILE NAV -->
<nav class="mobile-nav">
  <div class="mobile-nav-inner">
    <a href="index.html" class="mobile-nav-btn"><i class="fas fa-home"></i><span>Beranda</span></a>
    <a href="peta-ngawi.html" class="mobile-nav-btn active"><i class="fas fa-map"></i><span>Peta Kab.</span></a>
    <a href="webgis-bringin.html" class="mobile-nav-btn"><i class="fas fa-crosshairs"></i><span>Bringin</span></a>
  </div>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const map = L.map("map", { zoomControl: false }).setView([-7.4, 111.4], 11);
  L.control.zoom({ position: "bottomright" }).addTo(map);

  map.createPane("labels");
  map.getPane("labels").style.zIndex = 650;
  map.getPane("labels").style.pointerEvents = "none";

  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; OSM & CartoDB', subdomains: 'abcd', maxZoom: 19,
  }).addTo(map);

  const elTahun = document.getElementById("tahun");
  const elLabelTahun = document.getElementById("labelTahun");
  const elFilterKecamatan = document.getElementById("filterKecamatan");
  const elFilterDesa = document.getElementById("filterDesa");
  const elTotalUnit = document.getElementById("totalUnit");
  const elDesaCount = document.getElementById("desaCount");
  const elKecCount = document.getElementById("kecCount");
  const elChartEmpty = document.getElementById("chartEmpty");

  const TAHUN_TERSEDIA = [2021, 2022, 2024, 2025];
  let geoLayer, dataGeojson, chartInstance, labelLayer;
  let desaPerKecamatan = {};
  elLabelTahun.textContent = elTahun.value;

  function getColor(val) {
    return val > 50 ? "#084594" : val > 30 ? "#2171b5" : val > 20 ? "#4292c6" : val > 10 ? "#6baed6" : val > 0 ? "#9ecae1" : "#f1f1f1";
  }

  function getStyleForFeature(feature) {
    const val = feature.properties["RTLH " + elTahun.value] || 0;
    return { fillColor: getColor(val), fillOpacity: 0.75, color: "#444", weight: 1 };
  }

  function buildPopup(feature) {
    const thn = elTahun.value;
    const prop = feature.properties;
    const rtlh = prop["RTLH " + thn] ?? "–";
    const isBringin = (prop.KECAMATAN || '').toUpperCase() === 'BRINGIN';
    const bringinLink = isBringin
      ? `<a href="webgis-bringin.html" style="display:block;margin-top:8px;background:#1B6CA8;color:#fff;text-align:center;padding:6px;border-radius:6px;font-size:12px;font-weight:700;text-decoration:none;"><i class="fas fa-crosshairs"></i> Lihat Data Detail</a>`
      : '';
    return `<div class="popup-content"><b>${prop.DESA}</b><br><span>Kec. ${prop.KECAMATAN}</span><hr>RTLH ${thn}: <b>${rtlh}</b>${bringinLink}</div>`;
  }

  function updateDashboard() {
    const field = "RTLH " + elTahun.value;
    let total = 0; let desaSet = new Set(); const kecamatan = {};
    geoLayer.eachLayer(layer => {
      const prop = layer.feature.properties;
      const val = prop[field] || 0;
      if (val > 0) {
        total += val; desaSet.add(prop.DESA);
        const kec = prop.KECAMATAN;
        kecamatan[kec] = (kecamatan[kec] || 0) + val;
      }
    });
    elTotalUnit.textContent = total.toLocaleString("id-ID");
    elDesaCount.textContent = desaSet.size;
    elKecCount.textContent = Object.keys(kecamatan).length;
    updateChart(kecamatan);
  }

  function updateChart(dataObj) {
    const labels = Object.keys(dataObj).sort((a, b) => dataObj[b] - dataObj[a]);
    const values = labels.map(k => dataObj[k]);
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    if (labels.length === 0) { elChartEmpty.style.display = "block"; return; }
    elChartEmpty.style.display = "none";
    const ctx = document.getElementById("chartKecamatan").getContext("2d");
    chartInstance = new Chart(ctx, {
      type: "bar",
      data: { labels, datasets: [{ label: "RTLH", data: values, backgroundColor: labels.map((_, i) => `hsl(${210 + i * 8}, 60%, ${55 - i * 2}%)`), borderRadius: 4 }] },
      options: {
        indexAxis: "y", responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `${ctx.parsed.x} unit` } } },
        scales: {
          x: { beginAtZero: true, ticks: { font: { size: 10 } }, grid: { color: "rgba(0,0,0,0.05)" } },
          y: { ticks: { font: { size: 10 } } }
        }
      }
    });
  }

  function updateLabel() {
    if (labelLayer) { map.removeLayer(labelLayer); labelLayer = null; }
    if (map.getZoom() < 13) return;
    const field = "RTLH " + elTahun.value;
    labelLayer = L.layerGroup();
    geoLayer.eachLayer(layer => {
      const center = layer.getBounds().getCenter();
      const jumlah = layer.feature.properties[field] || 0;
      labelLayer.addLayer(L.marker(center, {
        pane: "labels",
        icon: L.divIcon({ className: "label-jumlah", html: `<span>${jumlah}</span>`, iconSize: null })
      }));
    });
    labelLayer.addTo(map);
  }

  function cekTahunTersedia() {
    const thn = parseInt(elTahun.value);
    if (!TAHUN_TERSEDIA.includes(thn)) {
      elChartEmpty.textContent = `Data tahun ${thn} tidak tersedia.`;
      elChartEmpty.style.display = "block";
      elTotalUnit.textContent = "–"; elDesaCount.textContent = "–"; elKecCount.textContent = "–";
      return false;
    }
    elChartEmpty.textContent = "Tidak ada data pada tahun ini.";
    return true;
  }

  function refreshAll() {
    if (!geoLayer) return;
    if (!cekTahunTersedia()) { geoLayer.setStyle(getStyleForFeature); updateLabel(); return; }
    geoLayer.setStyle(getStyleForFeature);
    updateDashboard();
    updateLabel();
    geoLayer.eachLayer(layer => {
      if (layer.isPopupOpen()) layer.setPopupContent(buildPopup(layer.feature));
    });
  }

  fetch("data-bsps-rtlh.geojson")
    .then(res => { if (!res.ok) throw new Error("Gagal"); return res.json(); })
    .then(data => {
      dataGeojson = data;
      data.features.forEach(f => {
        const kec = f.properties.KECAMATAN, desa = f.properties.DESA;
        if (!desaPerKecamatan[kec]) {
          desaPerKecamatan[kec] = [];
          const opt = document.createElement("option"); opt.value = kec; opt.textContent = kec;
          elFilterKecamatan.appendChild(opt);
        }
        if (!desaPerKecamatan[kec].includes(desa)) desaPerKecamatan[kec].push(desa);
      });
      const optsKec = Array.from(elFilterKecamatan.options).slice(1);
      optsKec.sort((a, b) => a.text.localeCompare(b.text, "id"));
      optsKec.forEach(o => elFilterKecamatan.appendChild(o));

      geoLayer = L.geoJSON(data, {
        style: getStyleForFeature,
        onEachFeature: (feature, layer) => {
          layer.on("click", () => { layer.bindPopup(buildPopup(feature)).openPopup(); map.fitBounds(layer.getBounds(), { maxZoom: 14, padding: [40, 40] }); });
          layer.on("mouseover", () => layer.setStyle({ weight: 2.5, color: "#222", fillOpacity: 0.9 }));
          layer.on("mouseout", () => geoLayer.resetStyle(layer));
        }
      }).addTo(map);
      map.fitBounds(geoLayer.getBounds());
      refreshAll();
    });

  elFilterKecamatan.addEventListener("change", function () {
    elFilterDesa.innerHTML = '<option value="">Semua Desa</option>';
    if (this.value === "") {
      geoLayer.clearLayers().addData(dataGeojson); geoLayer.setStyle(getStyleForFeature);
      map.fitBounds(geoLayer.getBounds()); refreshAll(); return;
    }
    const desaList = (desaPerKecamatan[this.value] || []).slice().sort((a, b) => a.localeCompare(b, "id"));
    desaList.forEach(d => { const opt = document.createElement("option"); opt.value = d; opt.textContent = d; elFilterDesa.appendChild(opt); });
    const filtered = { type: "FeatureCollection", features: dataGeojson.features.filter(f => f.properties.KECAMATAN === this.value) };
    geoLayer.clearLayers().addData(filtered); geoLayer.setStyle(getStyleForFeature);
    if (geoLayer.getLayers().length) map.fitBounds(geoLayer.getBounds(), { padding: [30, 30] });
    refreshAll();
  });

  elFilterDesa.addEventListener("change", function () {
    if (this.value === "") { elFilterKecamatan.dispatchEvent(new Event("change")); return; }
    const filtered = { type: "FeatureCollection", features: dataGeojson.features.filter(f => f.properties.DESA === this.value) };
    geoLayer.clearLayers().addData(filtered); geoLayer.setStyle(getStyleForFeature);
    if (geoLayer.getLayers().length) map.fitBounds(geoLayer.getBounds(), { maxZoom: 15, padding: [40, 40] });
    refreshAll();
  });

  elTahun.addEventListener("input", function () { elLabelTahun.textContent = this.value; refreshAll(); });
  map.on("zoomend", updateLabel);
});
</script>
</body>
</html>
